spring.application.name=bingetogether-backend
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 🔒 Kept as none to guarantee your deployment never crashes on startup
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 🛠️ FIXED: Forces Hibernate to cleanly map text fields and database sequences without contexts
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

jwt.secret=mySuperSecretCustomSecureSigningKeyForBingeTogetherProject2026!

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000