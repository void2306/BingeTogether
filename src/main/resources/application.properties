spring.application.name=bingetogether-backend
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 🛠️ FIXED: Standard connection allocation settings that align natively with Railway DB
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

jwt.secret=mySuperSecretCustomSecureSigningKeyForBingeTogetherProject2026!