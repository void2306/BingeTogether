

spring.application.name=bingetogether-backend
server.port=${PORT:8080}

# 🌐 FIXED RAILWAY DATABASE CONNECTION PROTOCOL
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# 🛠️ SAFE AUTO-CREATE TABLES ON STARTUP
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.ddl2ddl.auto=update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 🔑 SECURITY SIGNING KEYS
jwt.secret=mySuperSecretCustomSecureSigningKeyForBingeTogetherProject2026!