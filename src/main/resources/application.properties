spring.application.name=bingetogether-backend
server.port=${PORT:8080}

# 🌐 Global Proxy Native Routing
spring.datasource.url=jdbc:postgresql://hayabusa.proxy.rlwy.net:38654/railway
spring.datasource.username=postgres
spring.datasource.password=Sakshi@24void
spring.datasource.driver-class-name=org.postgresql.Driver

# 🔄 PostgreSQL Hibernate Dialect & Configurations
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 🔑 Hardcoded development signature string
jwt.secret=mySuperSecretCustomSecureSigningKeyForBingeTogetherProject2026!

# ⏳ Connection Pool Management
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000