spring.application.name=bingetogether-backend
server.port=${PORT:8080}

# 🌐 FIXED RAILWAY DATABASE CONNECTION PROTOCOL
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# 🛠️ THE SHIELD: Drop metadata auto-validation to break boot initialization loops
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 🔑 SECURITY SIGNING KEYS
jwt.secret=mySuperSecretCustomSecureSigningKeyForBingeTogetherProject2026!