spring.application.name=bingetogether-backend
server.port=${PORT:8080}

# 🌐 FIXED RAILWAY DATABASE CONNECTION PROTOCOL
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# 🛠️ SAFE RUNTIME INITIALIZATION FLAGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 🔑 SECURITY SIGNING KEYS
jwt.secret=mySuperSecretCustomSecureSigningKeyForBingeTogetherProject2026!