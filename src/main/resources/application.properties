spring.application.name=bingetogether-backend
server.port=${PORT:8080}

# 🌐 FIXED RAILWAY DATABASE CONNECTION PROTOCOL
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# 🛠️ HARDCODED DIALECT TO BYPASS THE CRASHING AUTO-DETECTION
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# 🔑 SECURITY SIGNING KEYS
jwt.secret=mySuperSecretCustomSecureSigningKeyForBingeTogetherProject2026!