version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/bingetogether?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Sakshi@24
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306" # Mapped to 3307 on host to avoid conflict if you have local MySQL running
    environment:
      - MYSQL_DATABASE=bingetogether
      - MYSQL_ROOT_PASSWORD=Sakshi@24
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
