version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:8080"
    environment:
      # Replace 'your-aws-db-endpoint' with your actual AWS RDS endpoint
      # Replace 'bingetogether' with your database name if it's different
      - SPRING_DATASOURCE_URL=jdbc:mysql://your-aws-db-endpoint:3306/bingetogether?allowPublicKeyRetrieval=true&useSSL=false
      # Replace these with your AWS database credentials
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=your_aws_db_password
